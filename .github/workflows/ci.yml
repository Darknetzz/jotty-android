name: CI

# Manual only — run locally: scripts/ci-local.ps1 or scripts/ci-local.sh (see docs/LOCAL_CI.md)
on:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Unit tests
        run: chmod +x gradlew && ./gradlew test --no-daemon

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: app/build/reports/tests/

      - name: Lint (debug + release)
        run: ./gradlew lintDebug lintRelease --no-daemon

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-release.html

      - name: ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Assemble release
        run: ./gradlew assembleRelease --no-daemon

  android-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Run instrumentation smoke test
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: ./gradlew connectedDebugAndroidTest --no-daemon -Pandroid.testInstrumentationRunnerArguments.class=com.jotty.android.MainActivitySmokeTest,com.jotty.android.PerformanceBaselineTest

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - name: Dependency vulnerability review
        uses: actions/dependency-review-action@v5
