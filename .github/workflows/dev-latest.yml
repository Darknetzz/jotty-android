name: Dev Latest APK

on:
  push:
    branches: [dev]

jobs:
  dev-latest-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Read version name
        id: ver
        run: |
          VERSION_NAME=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2-)
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      # Monotonic versionCode per CI run so devâ†’dev in-app updates work when gradle VERSION_CODE is unchanged.
      - name: Compute dev version code
        id: devcode
        run: |
          BASE=$(grep '^VERSION_CODE=' gradle.properties | cut -d= -f2-)
          DEV_CODE=$(( BASE * 10000 + GITHUB_RUN_NUMBER % 10000 ))
          echo "code=$DEV_CODE" >> "$GITHUB_OUTPUT"
          echo "Dev VERSION_CODE=$DEV_CODE (base=$BASE, run=$GITHUB_RUN_NUMBER)"

      # Same release keystore as stable releases so in-app dev updates install over v1.3.x stable.
      - name: Decode release keystore
        id: signing
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "have_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for var in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::ANDROID_KEYSTORE_B64 is set but $var is missing. Set all four signing secrets."
              exit 1
            fi
          done
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/ci-release.keystore"
          {
            echo "storeFile=$GITHUB_WORKSPACE/ci-release.keystore"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > keystore.properties
          echo "have_release=true" >> "$GITHUB_OUTPUT"

      - name: Build release dev APK
        if: steps.signing.outputs.have_release == 'true'
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon -PDEV_BUILD_SHA=${GITHUB_SHA} -PVERSION_CODE=${{ steps.devcode.outputs.code }}

      - name: Build debug dev APK (no release keystore)
        if: steps.signing.outputs.have_release != 'true'
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon -PDEV_BUILD_SHA=${GITHUB_SHA} -PVERSION_CODE=${{ steps.devcode.outputs.code }}

      - name: Prepare dev-latest asset
        id: asset
        run: |
          VERSION="${{ steps.ver.outputs.VERSION_NAME }}"
          if [ "${{ steps.signing.outputs.have_release }}" = "true" ]; then
            OUT="jotty-android-${VERSION}-dev.apk"
            cp app/build/outputs/apk/release/app-release.apk "$OUT"
          else
            OUT="jotty-android-${VERSION}-dev-debug.apk"
            cp app/build/outputs/apk/debug/app-debug.apk "$OUT"
          fi
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Signing reminder (no release keystore)
        if: steps.signing.outputs.have_release != 'true'
        run: |
          {
            echo "## Dev APK signing"
            echo ""
            echo "No release keystore secrets were configured. Attached **debug-signed** dev APK."
            echo "Users on **release-signed** stable installs may see **App not installed** when updating via the app."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Reset dev-latest release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev-latest --cleanup-tag --yes || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/dev-latest" || true

      - name: Publish rolling dev-latest pre-release
        uses: ncipollo/release-action@v1
        with:
          tag: dev-latest
          commit: ${{ github.sha }}
          name: Dev Latest
          body: |
            Rolling pre-release build from `dev`.
            âš ď¸Ź This preview build may contain unstable or breaking bugs.

            <!-- Commit: ${{ github.sha }} -->

            | Item | Link |
            | --- | --- |
            | Commit | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
            | Run | [GitHub Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | Changelog | [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/dev/CHANGELOG.md) |
          prerelease: true
          makeLatest: false
          artifacts: ${{ steps.asset.outputs.path }}
          artifactErrorsFailBuild: true
          allowUpdates: false
          removeArtifacts: true
          replacesArtifacts: true
