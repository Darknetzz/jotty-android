name: Release APK

on:
  release:
    types: [published]

jobs:
  release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Read version name
        id: ver
        run: |
          VERSION_NAME=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2-)
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      # Debug APK is signed with the CI debug keystore and installable without repo secrets.
      # For a minified release-signed APK, build locally with keystore.properties (see README).
      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare release asset filename
        run: cp app/build/outputs/apk/debug/app-debug.apk "jotty-android-${{ steps.ver.outputs.VERSION_NAME }}-debug.apk"

      - name: Attach APK to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: jotty-android-${{ steps.ver.outputs.VERSION_NAME }}-debug.apk
          fail_on_unmatched_files: true
          overwrite_files: true
