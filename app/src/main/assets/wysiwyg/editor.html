<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
  }
  #editor {
    height: 100%;
    min-height: 100%;
    margin: 0;
    padding: 12px 8px 16px;
    outline: none;
    line-height: 1.5;
    font-size: 16px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-sizing: border-box;
    word-wrap: break-word;
  }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  td, th { border: 1px solid #ccc; padding: 6px; vertical-align: top; }
  img { max-width: 100%; height: auto; }
  h1, h2, h3 { margin: 0.6em 0 0.3em; line-height: 1.25; }
  p { margin: 0.4em 0; }
  @media (prefers-color-scheme: dark) {
    #editor { color: #eee; }
    td, th { border-color: #555; }
  }
</style>
</head>
<body>
<div id="editor" contenteditable="true"></div>
<script>
  function cmd(command, value) {
    document.execCommand(command, false, value || null);
    notifyChange();
  }
  function insertLink() {
    var url = prompt('URL');
    if (url) { cmd('createLink', url); }
  }
  function insertTable() {
    var html = '<table><thead><tr><th>Header</th></tr></thead><tbody><tr><td>Cell</td></tr></tbody></table><p></p>';
    cmd('insertHTML', html);
  }
  function setContent(html) {
    document.getElementById('editor').innerHTML = html || '';
  }
  function getContent() {
    return document.getElementById('editor').innerHTML;
  }
  function notifyChange() {
    if (window.AndroidBridge && AndroidBridge.onContentChanged) {
      AndroidBridge.onContentChanged(getContent());
    }
  }
  document.getElementById('editor').addEventListener('input', notifyChange);
</script>
</body>
</html>
